name: Termuric Mod Compiler
on:
  workflow_dispatch:
    inputs:
      minecraft_version:
        description: 'The branch/version to build (e.g., 1.20)'
        required: true
        default: '1.20'
      project_id:
        description: 'Firebase Project ID'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Tell GitHub to jump to the branch the user selected in your UI
      - name: Checkout Template Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.minecraft_version }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build
