name: Build Hackerini Client
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Pobieranie kodu z Twojego repozytorium
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Konfiguracja Javy 21 (wymagana dla MC 1.21.4)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Nadanie uprawnień skryptowi Gradle (ważne na Linuxie)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Budowanie moda (kompilacja pliku .jar)
      - name: Build with Gradle
        run: ./gradlew build

      # 5. Wysłanie gotowego pliku .jar do zakładki "Artifacts"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hackerini-Client-1.21.4
          path: build/libs/*.jar
          if-no-files-found: error