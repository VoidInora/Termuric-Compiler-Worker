services:
  mc:
    image: itzg/minecraft-server:java17
    environment:
      EULA: "TRUE"
      TYPE: FABRIC
      VERSION: "1.20.1"
      FABRIC_LOADER_VERSION: "0.15.11"
      DEBUG: "true"            # show why it bails if anything is off
    volumes:
      - ./mods:/mods          # your mod jar(s) here; copied into /data/mods on first run
      - ./data:/data          # persist world and server files
    ports:
      - "25565:25565"
    restart: unless-stopped
